# TeleFeed Configuration
# Define your "areas of concern" below.
#
# Each area has:
#   name        : A label for this filter category
#   description : Plain-text intent (used for display; AI matching in Phase 2)
#   keywords    : Any message containing at least one of these is a candidate
#   negative_keywords : Messages containing any of these are discarded
#   sources     : (OPTIONAL) Specific Telegram channel usernames to watch.
#                 If you omit 'sources' (or leave it empty), TeleFeed will
#                 automatically scan ALL channels and supergroups you are
#                 subscribed to on Telegram.
#
# Matcher mode:
#   matcher: 'keywords' (default) or 'ai'
#   ai_threshold: 0-100 relevance score required (default: 65)
#   If matcher is 'ai', you MUST set GEMINI_API_KEY in .env

matcher: ai
ai_threshold: 65

areas:
  - name: "Remote Software Jobs"
    description: >
      Job postings for software developers or engineers. Preferably remote
      positions. Interested in backend, full-stack, Python, Rust, or Go roles.
      Not interested in internships, unpaid positions, or on-site only roles.
    keywords:
      - software engineer
      - software developer
      - backend developer
      - full stack
      - python developer
      - remote
      - hiring
      - we are hiring
      - job opening
      - vacancy
    negative_keywords:
      - internship
      - unpaid
      - volunteer
      - on-site only
      - no remote
    # No 'sources' here → TeleFeed will scan all your subscribed channels

  - name: "AI & Machine Learning News"
    description: >
      News, papers, tools, or discussions about large language models,
      generative AI, AI agents, or machine learning research.
    keywords:
      - llm
      - large language model
      - generative ai
      - gpt
      - transformer
      - diffusion
      - ai agent
      - machine learning
      - deep learning
    negative_keywords: []

