name: TeleFeed CI Test Suite

on:
  push:
    branches: [ main, "feat/*" ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Pytest Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14" # Specify your single preferred version here
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run pytest test suite
        run: |
          pytest -v --cov=telefeed --cov-report=xml
